services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: config/backend.env
    environment:
      POSTGRES_DB: republic_agent
      POSTGRES_USER: agent
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: src/backend
    restart: unless-stopped
    env_file: config/backend.env
    depends_on:
      - db
    volumes:
      - ./config/service_account.json:/app/config/service_account.json:ro
      - ./config/business_config.json:/app/config/business_config.json:ro
      - ./config/tech_config.json:/app/config/tech_config.json:ro
      - ./config/keys:/app/config/keys:ro
      - ./repos:/opt/repos
      - ${CLAUDE_AUTH_DIR:-.}/.claude:/root/.claude
      - ${CLAUDE_AUTH_DIR:-.}/.claude.json:/root/.claude.json

  bot:
    build: src/client/telegram_bot
    restart: unless-stopped
    env_file: config/bot.env

volumes:
  pgdata:
