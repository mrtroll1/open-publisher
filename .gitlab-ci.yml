include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - deploy-api
  - deploy-bot

deploy-api:
  stage: deploy-api
  tags:
    - self-hosted
  only:
    - main
  script:
    - cd /opt/open-publisher
    - git pull
    - docker compose up -d --build api
    - for i in $(seq 1 30); do docker compose exec api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')" && exit 0; sleep 1; done; exit 1

deploy-bot:
  stage: deploy-bot
  tags:
    - self-hosted
  only:
    - main
  script:
    - cd /opt/open-publisher
    - docker compose up -d --build bot
