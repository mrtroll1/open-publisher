services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: config/.env
    environment:
      POSTGRES_DB: republic_agent
      POSTGRES_USER: agent
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: ["python", "-m", "backend.run"]
    restart: unless-stopped
    env_file: config/.env
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - ./config/service_account.json:/app/config/service_account.json:ro
      - ./config/business_config.json:/app/config/business_config.json:ro
      - ./config/tech_config.json:/app/config/tech_config.json:ro
      - ./config/keys:/app/config/keys:ro

  bot:
    build: .
    restart: unless-stopped
    env_file: config/.env
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./config/service_account.json:/app/config/service_account.json:ro
      - ./config/business_config.json:/app/config/business_config.json:ro
      - ./config/tech_config.json:/app/config/tech_config.json:ro
      - ./repos:/opt/repos
      - ${CLAUDE_AUTH_DIR}/.claude:/root/.claude
      - ${CLAUDE_AUTH_DIR}/.claude.json:/root/.claude.json

volumes:
  pgdata:
