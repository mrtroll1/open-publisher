include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - deploy-api
  - deploy-bot

deploy-api:
  stage: deploy-api
  tags:
    - self-hosted
  only:
    - main
  script:
    - cd /opt/open-publisher && git pull
    - docker compose up -d --build api

deploy-bot:
  stage: deploy-bot
  tags:
    - self-hosted
  only:
    - main
  script:
    - cd /opt/open-publisher && git pull
    - docker compose up -d --build bot
